image:
  repository: ghcr.io/ralton-dev/url-utilities
  tag: 'v2.0.0'
  pullPolicy: IfNotPresent

imagePullSecrets: []
# - name: ghcr-regcred

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: ''
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: short.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: url-utilities-tls
    #   hosts:
    #     - short.example.com

# Non-secret config wired via ConfigMap
config:
  APP_URL: 'https://short.example.com'

# Secrets: choose ONE of the two modes.
# Mode A (bootstrap): provide plaintext values here; chart renders a Secret.
# Mode B (existing): set existingSecret to the name of a pre-materialized
#   Secret (e.g. created by sealed-secrets). Must expose keys API_KEY,
#   POSTGRES_URL.
secrets:
  existingSecret: ''
  API_KEY: ''
  POSTGRES_URL: ''

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

probes:
  liveness:
    path: /api/health
    initialDelaySeconds: 10
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /api/ready
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ['ALL']

nodeSelector: {}
tolerations: []
affinity: {}

# Run `drizzle-kit push` as a pre-install/pre-upgrade Helm hook to apply
# schema changes before the app rolls out.
migration:
  enabled: true
  command: ['node', 'scripts/migrate.mjs']
